<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bullet Dodge - 총알 피하기</title>
    <meta name="description" content="사방에서 날아오는 총알을 피하는 비행기 게임">
    <link rel="icon" href="icon.png" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #080b12;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: center center;
            overflow: hidden;
            cursor: auto;
            font-family: 'Rajdhani', sans-serif;
            user-select: none;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #gameCanvas {
            display: block;
        }

        #ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        #timer-display {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', monospace;
            font-size: 48px;
            font-weight: 900;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.6),
                0 0 40px rgba(0, 255, 204, 0.3);
            z-index: 20;
            letter-spacing: 4px;
        }

        #bullet-count {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 100, 100, 0.8);
            z-index: 20;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #highscore-display {
            position: fixed;
            top: 30px;
            right: 40px;
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 400;
            color: rgba(255, 215, 0, 0.7);
            z-index: 20;
            text-align: right;
        }

        #highscore-display span {
            display: block;
            font-size: 24px;
            font-weight: 700;
            color: rgba(255, 215, 0, 0.9);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        /* Start Screen */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: radial-gradient(ellipse at center, rgba(0, 20, 40, 0.95) 0%, rgba(0, 0, 0, 0.98) 100%);
        }

        #start-screen h1 {
            font-family: 'Orbitron', monospace;
            font-size: 72px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ffcc, #0088ff, #ff00cc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-align: center;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {

            0%,
            100% {
                filter: brightness(1);
                transform: scale(1);
            }

            50% {
                filter: brightness(1.2);
                transform: scale(1.02);
            }
        }

        #start-screen .subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: 22px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 30px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        #start-screen .instructions {
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 10px;
            text-align: center;
            line-height: 1.8;
        }

        /* Name Input */
        .name-input-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .name-input-wrap label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .name-input {
            pointer-events: auto;
            cursor: text;
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 700;
            padding: 12px 24px;
            border: 2px solid rgba(0, 255, 204, 0.4);
            background: rgba(0, 255, 204, 0.05);
            color: #00ffcc;
            border-radius: 8px;
            text-align: center;
            width: 260px;
            outline: none;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }

        .name-input:focus {
            border-color: #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        .name-input::placeholder {
            color: rgba(0, 255, 204, 0.3);
            font-weight: 400;
        }

        .start-btn {
            pointer-events: auto;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 24px;
            font-weight: 700;
            padding: 18px 60px;
            border: 2px solid #00ffcc;
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            letter-spacing: 4px;
            margin-top: 30px;
            text-transform: uppercase;
        }

        .start-btn:hover {
            background: rgba(0, 255, 204, 0.25);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.3),
                inset 0 0 30px rgba(0, 255, 204, 0.1);
            transform: scale(1.05);
        }

        /* Game Over Screen */
        #gameover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: radial-gradient(ellipse at center, rgba(40, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.98) 100%);
            overflow-y: auto;
        }

        #gameover-screen h1 {
            font-family: 'Orbitron', monospace;
            font-size: 64px;
            font-weight: 900;
            color: #ff3344;
            text-shadow: 0 0 30px rgba(255, 51, 68, 0.6);
            margin-bottom: 20px;
            animation: shakeText 0.5s ease-in-out;
        }

        @keyframes shakeText {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-10px);
            }

            40% {
                transform: translateX(10px);
            }

            60% {
                transform: translateX(-5px);
            }

            80% {
                transform: translateX(5px);
            }
        }

        #gameover-screen .final-time {
            font-family: 'Orbitron', monospace;
            font-size: 42px;
            font-weight: 700;
            color: #00ffcc;
            margin-bottom: 5px;
        }

        #gameover-screen .final-label {
            font-family: 'Rajdhani', sans-serif;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        #gameover-screen .new-record {
            font-family: 'Orbitron', monospace;
            font-size: 22px;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 15px;
            animation: recordPulse 1s ease-in-out infinite;
        }

        @keyframes recordPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .rank-info {
            font-family: 'Orbitron', monospace;
            font-size: 18px;
            color: rgba(0, 255, 204, 0.8);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .rank-info .rank-num {
            font-size: 28px;
            font-weight: 900;
            color: #00ffcc;
            text-shadow: 0 0 15px rgba(0, 255, 204, 0.5);
        }

        .submit-status {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 10px;
            letter-spacing: 1px;
            min-height: 20px;
        }

        /* Leaderboard */
        .leaderboard-container {
            width: 380px;
            max-height: 340px;
            margin-top: 10px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 255, 204, 0.15);
            border-radius: 12px;
            background: rgba(0, 20, 30, 0.6);
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .leaderboard-header {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            color: rgba(0, 255, 204, 0.7);
            padding: 12px 20px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(0, 255, 204, 0.1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .leaderboard-header .online-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 8px rgba(0, 255, 136, 0.6);
            animation: dotPulse 2s ease-in-out infinite;
        }

        @keyframes dotPulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .leaderboard-list {
            max-height: 280px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .leaderboard-list::-webkit-scrollbar {
            width: 4px;
        }

        .leaderboard-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .leaderboard-list::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 204, 0.2);
            border-radius: 2px;
        }

        .lb-row {
            display: flex;
            align-items: center;
            padding: 8px 20px;
            transition: background 0.2s;
            gap: 12px;
        }

        .lb-row:hover {
            background: rgba(0, 255, 204, 0.03);
        }

        .lb-row.is-me {
            background: rgba(0, 255, 204, 0.08);
            border-left: 3px solid #00ffcc;
        }

        .lb-rank {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.3);
            width: 32px;
            text-align: center;
            flex-shrink: 0;
        }

        .lb-row:nth-child(1) .lb-rank {
            color: #ffd700;
        }

        .lb-row:nth-child(2) .lb-rank {
            color: #c0c0c0;
        }

        .lb-row:nth-child(3) .lb-rank {
            color: #cd7f32;
        }

        .lb-medal {
            font-size: 16px;
            width: 22px;
            text-align: center;
            flex-shrink: 0;
        }

        .lb-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .lb-row.is-me .lb-name {
            color: #00ffcc;
        }

        .lb-time {
            font-family: 'Orbitron', monospace;
            font-size: 14px;
            font-weight: 700;
            color: rgba(0, 255, 204, 0.8);
            flex-shrink: 0;
        }

        .lb-date {
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            flex-shrink: 0;
            width: 80px;
            text-align: right;
        }

        .lb-empty {
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.2);
            padding: 30px 20px;
            text-align: center;
        }

        .lb-loading {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            color: rgba(0, 255, 204, 0.4);
            padding: 20px;
            text-align: center;
            animation: loadingPulse 1.5s ease-in-out infinite;
        }

        @keyframes loadingPulse {

            0%,
            100% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }
        }

        .lb-error {
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            color: rgba(255, 100, 100, 0.6);
            padding: 20px;
            text-align: center;
        }

        .retry-btn {
            pointer-events: auto;
            cursor: pointer;
            font-family: 'Orbitron', monospace;
            font-size: 20px;
            font-weight: 700;
            padding: 16px 50px;
            border: 2px solid #ff3344;
            background: rgba(255, 51, 68, 0.1);
            color: #ff3344;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            letter-spacing: 4px;
            margin-top: 10px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .retry-btn:hover {
            background: rgba(255, 51, 68, 0.25);
            box-shadow: 0 0 30px rgba(255, 51, 68, 0.3),
                inset 0 0 30px rgba(255, 51, 68, 0.1);
            transform: scale(1.05);
        }

        /* Leaderboard on Start Screen */
        .start-leaderboard {
            margin-top: 30px;
            width: 380px;
        }

        /* Virtual Joystick */
        #joystick-zone {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 45%;
            z-index: 50;
            pointer-events: auto;
            display: none;
        }

        #joystick-base {
            position: absolute;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(0, 255, 204, 0.08);
            border: 2px solid rgba(0, 255, 204, 0.2);
            pointer-events: none;
            display: none;
        }

        #joystick-thumb {
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 255, 204, 0.5), rgba(0, 255, 204, 0.15));
            border: 2px solid rgba(0, 255, 204, 0.6);
            pointer-events: none;
            display: none;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        /* Mobile indicator */
        #mobile-hint {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Rajdhani', sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.25);
            z-index: 20;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #start-screen h1 {
                font-size: 42px;
            }

            #start-screen .subtitle {
                font-size: 16px;
                margin-bottom: 20px;
            }

            #start-screen .instructions {
                font-size: 14px;
                padding: 0 20px;
            }

            .name-input {
                font-size: 16px;
                width: 220px;
                padding: 10px 16px;
            }

            .start-btn {
                font-size: 18px;
                padding: 14px 40px;
                margin-top: 20px;
            }

            .start-leaderboard {
                width: 320px;
                margin-top: 20px;
            }

            .leaderboard-container {
                width: 320px;
            }

            #timer-display {
                font-size: 32px;
                top: 15px;
            }

            #bullet-count {
                top: 55px;
                font-size: 13px;
            }

            #highscore-display {
                top: 15px;
                right: 15px;
                font-size: 12px;
            }

            #highscore-display span {
                font-size: 18px;
            }

            #connection-status {
                top: 15px;
                left: 15px;
                font-size: 10px;
            }

            #gameover-screen h1 {
                font-size: 40px;
                margin-bottom: 10px;
            }

            #gameover-screen .final-time {
                font-size: 32px;
            }

            .retry-btn {
                font-size: 16px;
                padding: 12px 36px;
            }

            .lb-row {
                padding: 6px 12px;
            }

            .lb-date {
                display: none;
            }
        }

        @media (max-width: 480px) {
            #start-screen h1 {
                font-size: 34px;
            }

            .start-leaderboard,
            .leaderboard-container {
                width: 280px;
            }

            #gameover-screen {
                padding: 20px;
            }
        }

        /* Warning flash */
        #warning-flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(255, 0, 0, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 15;
            opacity: 0;
            transition: opacity 0.1s;
        }

        /* Connection indicator */
        #connection-status {
            position: fixed;
            top: 30px;
            left: 40px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #connection-status .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            transition: background 0.3s;
        }

        #connection-status .dot.online {
            background: #00ff88;
            box-shadow: 0 0 6px rgba(0, 255, 136, 0.6);
        }

        #connection-status .dot.offline {
            background: #ff4444;
            box-shadow: 0 0 6px rgba(255, 68, 68, 0.6);
        }
    </style>
</head>

<body>
    <canvas id="gameCanvas"></canvas>

    <div id="timer-display">0.00s</div>
    <div id="bullet-count"></div>
    <div id="highscore-display">BEST<span id="best-time">0.00s</span></div>
    <div id="connection-status"><span class="dot offline"></span><span id="conn-text">OFFLINE</span></div>
    <div id="warning-flash"></div>

    <!-- Mobile Virtual Joystick -->
    <div id="joystick-zone">
        <div id="joystick-base"></div>
        <div id="joystick-thumb"></div>
    </div>
    <div id="mobile-hint">화면을 터치하여 조종</div>

    <div id="start-screen">
        <h1>BULLET<br>DODGE</h1>
        <div class="subtitle">총알 피하기</div>
        <div class="instructions" id="instructions-text">
            마우스 또는 방향키로 비행기를 조종하세요<br>
            사방에서 날아오는 총알을 피하세요<br>
            시간이 지날수록 총알이 점점 많아집니다
        </div>
        <div class="name-input-wrap">
            <label>PILOT NAME</label>
            <input type="text" class="name-input" id="player-name" placeholder="이름 입력" maxlength="20"

        </div>
        <button class="start-btn" id="start-btn">START</button>
        <div class="start-leaderboard">
            <div class="leaderboard-container" id="start-leaderboard-box">
                <div class="leaderboard-header"><span class="online-dot"></span>ONLINE RANKING</div>
                <div class="leaderboard-list" id="start-lb-list">
                    <div class="lb-loading">기록을 불러오는 중...</div>
                </div>

        </div>
    </div>

    <div id="gameover-screen">

        <div class="submit-status" id="submit-status"></div>
        <div class="leaderboard-container" id="gameover-leaderboard-box">
            <div class="leaderboard-header"><span class="online-dot"></span>ONLINE RANKING</div>
            <div class="leaderboard-list" id="gameover-lb-list">
                <div class="lb-loading">기록을 불러오는 중...</div>
            </div>
        </div>
        <button class="retry-btn" id="retry-btn">RETRY</button>
    </div>

                    lbEmpty: '아직 기록이 없습니다. 첫 번째 기록을 세워보세요!',
                    lbError: '서버에 연결할 수 없습니다',
                    lbLoadError: '리더보드를 불러올 수 없습니다',
                    survivalTime: '생존 시간',
                    submitting: '기록 등록 중...',
                    submitted: '기록이 등록되었습니다!',
                    submitFail: '기록 등록 실패',
                    connectFail: '서버 연결 실패',
                },
                en: {
                    subtitle: 'Dodge the Bullets',
                    instructions: 'Use mouse or arrow keys to control the plane<br>Dodge bullets coming from all directions<br>More bullets spawn as time goes on',
                    instructionsMobile: 'Drag the screen to control the plane<br>Dodge bullets coming from all directions<br>More bullets spawn as time goes on',
                    mobileHint: 'Touch to control',
                    placeholder: 'Enter name',
                    loading: 'Loading...',
                    lbEmpty: 'No records yet. Be the first!',
                    lbError: 'Cannot connect to server',
                    lbLoadError: 'Failed to load leaderboard',
                    survivalTime: 'SURVIVAL TIME',
                    submitting: 'Submitting...',
                    submitted: 'Score registered!',
                    submitFail: 'Failed to submit',
                    connectFail: 'Connection failed',
                }
            };
            let lang = LANG.ko; // default Korean

            function applyLanguage() {
                const isKR = playerCountry === 'KR';
                lang = isKR ? LANG.ko : LANG.en;

                // Update HTML text
                document.querySelector('#start-screen .subtitle').textContent = lang.subtitle;
                document.getElementById('instructions-text').innerHTML = isMobile ? lang.instructionsMobile : lang.instructions;
                document.getElementById('mobile-hint').textContent = lang.mobileHint;
                document.getElementById('player-name').placeholder = lang.placeholder;
                document.querySelector('#start-screen .lb-loading, #start-lb-list')
                    && (document.getElementById('start-lb-list').innerHTML = `<div class="lb-loading">${lang.loading}</div>`);
                document.querySelector('.final-label').textContent = lang.survivalTime;

                // Update page title & meta
                if (!isKR) {
                    document.title = 'Bullet Dodge';
                    const meta = document.querySelector('meta[name="description"]');
                    if (meta) meta.content = 'Dodge bullets from all directions in this airplane game';
                }
            }

            // Country code to flag emoji
            function countryToFlag(code) {
                if (!code || code.length !== 2) return '';
                const offset = 0x1F1E6 - 65;
                return String.fromCodePoint(
                    code.charCodeAt(0) + offset,
                    code.charCodeAt(1) + offset
                );
            }

            // Detect country on load & apply language
            async function detectCountry() {
                try {
                    const res = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(3000) });
                    const data = await res.json();
                    playerCountry = (data.country_code || '').toUpperCase();
                } catch {
                    playerCountry = '';
                }
                applyLanguage();
            }
            detectCountry();

            // ─── Canvas Setup ───
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            // ─── Game State ───
            let gameState = 'start'; // start, playing, gameover
            let startTime = 0;
            let survivalTime = 0;
            let highScore = parseFloat(localStorage.getItem('bulletDodgeHighScore')) || 0;
            let playerName = localStorage.getItem('bulletDodgePlayerName') || '';
            let bullets = [];
            let particles = [];
            let stars = [];
            let shakeAmount = 0;
            let warningFlash = 0;
            let difficultyTimer = 0;
            let bulletSpawnRate = 0.8;
            let minSpawnRate = 0.06;
            let bulletSpeed = 3;
            let frameCount = 0;
            let lastSubmittedId = null;

            // Player
            const player = {
                x: canvas.width / 2,
                y: canvas.height / 2,
                size: 20,
                angle: -Math.PI / 2,
                targetX: canvas.width / 2,
                targetY: canvas.height / 2,
                trail: [],
                invincible: false,
                engineGlow: 0,
            };

            // Input
            const keys = {};
            let mouseX = canvas.width / 2;
            let mouseY = canvas.height / 2;
            let useMouseControl = true;

            // ─── UI Elements ───
            const timerDisplay = document.getElementById('timer-display');
            const bulletCountDisplay = document.getElementById('bullet-count');
            const bestTimeDisplay = document.getElementById('best-time');
            const startScreen = document.getElementById('start-screen');
            const gameoverScreen = document.getElementById('gameover-screen');
            const finalTimeEl = document.getElementById('final-time');
            const newRecordEl = document.getElementById('new-record');
            const warningFlashEl = document.getElementById('warning-flash');
            const playerNameInput = document.getElementById('player-name');
            const rankInfoEl = document.getElementById('rank-info');
            const rankNumEl = document.getElementById('rank-num');
            const submitStatusEl = document.getElementById('submit-status');
            const connDot = document.querySelector('#connection-status .dot');
            const connText = document.getElementById('conn-text');

            bestTimeDisplay.textContent = highScore.toFixed(2) + 's';
            playerNameInput.value = playerName;

            // ─── Supabase Leaderboard API ───
            async function checkConnection() {
                try {
                    const res = await fetch(
                        `${SUPABASE_URL}/rest/v1/scores?select=id&limit=1`,
                        { headers: API_HEADERS, signal: AbortSignal.timeout(5000) }
                    );
                    serverOnline = res.ok;
                } catch {
                    serverOnline = false;
                }
                updateConnectionUI();
            }

            function updateConnectionUI() {
                connDot.className = 'dot ' + (serverOnline ? 'online' : 'offline');
                connText.textContent = serverOnline ? 'ONLINE' : 'OFFLINE';
            }

            async function fetchLeaderboard(targetListEl) {
                if (!serverOnline) {
                    targetListEl.innerHTML = `<div class="lb-error">${lang.lbError}</div>`;
                    return [];
                }

                targetListEl.innerHTML = `<div class="lb-loading">${lang.loading}</div>`;

                try {
                    const res = await fetch(
                        `${SUPABASE_URL}/rest/v1/scores?select=id,name,time,country,created_at&order=time.desc&limit=20`,
                        { headers: API_HEADERS }
                    );
                    const scores = await res.json();

                    // Add rank & format date
                    scores.forEach((s, i) => {
                        s.rank = i + 1;
                        s.time = parseFloat(s.time);
                        if (s.created_at) {
                            const d = new Date(s.created_at);
                            s.date = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                        }
                    });

                    renderLeaderboard(targetListEl, scores);
                    return scores;
                } catch (err) {
                    targetListEl.innerHTML = `<div class="lb-error">${lang.lbLoadError}</div>`;
                    return [];
                }
            }

            function renderLeaderboard(container, scores) {
                if (scores.length === 0) {
                    container.innerHTML = `<div class="lb-empty">${lang.lbEmpty}</div>`;
                    return;
                }

                const currentName = playerNameInput.value.trim();
                let html = '';

                scores.forEach((s, i) => {
                    const medals = ['🥇', '🥈', '🥉'];
                    const medal = i < 3 ? medals[i] : '';
                    const isMe = s.id === lastSubmittedId || (lastSubmittedId === null && s.name === currentName);

                    html += `
                    <div class="lb-row ${isMe ? 'is-me' : ''}">
                        <div class="lb-rank">${s.rank || i + 1}</div>
                        <div class="lb-medal">${medal}</div>
                        <div class="lb-name">${s.country ? countryToFlag(s.country) + ' ' : ''}${escapeHtml(s.name)}</div>
                        <div class="lb-time">${s.time.toFixed(2)}s</div>
                        <div class="lb-date">${s.date || ''}</div>
                    </div>
                `;
                });

                container.innerHTML = html;
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            async function submitScore(name, time) {
                if (!serverOnline || !name) return null;

                submitStatusEl.textContent = lang.submitting;

                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
                        method: 'POST',
                        headers: API_HEADERS,
                        body: JSON.stringify({ name, time: parseFloat(time.toFixed(2)), country: playerCountry }),
                    });

                    if (res.ok) {
                        const entries = await res.json();
                        const entry = entries[0];
                        lastSubmittedId = entry.id;
                        submitStatusEl.textContent = lang.submitted;

                        // Calculate rank by counting scores higher than this one
                        const countRes = await fetch(
                            `${SUPABASE_URL}/rest/v1/scores?select=id&time=gt.${entry.time}`,
                            { headers: { ...API_HEADERS, 'Prefer': 'count=exact' } }
                        );
                        const rank = parseInt(countRes.headers.get('content-range')?.split('/')[0]?.split('-')[1] || '0') + 1;

                        rankInfoEl.style.display = 'block';
                        rankNumEl.textContent = `#${rank}`;

                        return { success: true, rank, entry };
                    } else {
                        const err = await res.json();
                        submitStatusEl.textContent = err.message || lang.submitFail;
                        return null;
                    }
                } catch (err) {
                    submitStatusEl.textContent = lang.connectFail;
                    return null;
                }
            }

            // ─── Stars Background ───
            function initStars() {
                stars = [];
                for (let i = 0; i < 200; i++) {
                    stars.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 2 + 0.5,
                        speed: Math.random() * 0.5 + 0.1,
                        brightness: Math.random(),
                        twinkleSpeed: Math.random() * 0.02 + 0.005,
                    });
                }
            }
            initStars();

            // ─── Input Handlers ───
            document.addEventListener('keydown', e => {
                keys[e.key] = true;
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'w', 'a', 's', 'd'].includes(e.key)) {
                    useMouseControl = false;
                }
            });
            document.addEventListener('keyup', e => { keys[e.key] = false; });
            document.addEventListener('mousemove', e => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                useMouseControl = true;
            });

            // Buttons
            document.getElementById('start-btn').addEventListener('click', startGame);
            document.getElementById('retry-btn').addEventListener('click', startGame);

            // Space/Enter to start/retry (but not while typing name)
            document.addEventListener('keydown', e => {
                if (document.activeElement === playerNameInput) return;
                if ((e.key === ' ' || e.key === 'Enter') && gameState !== 'playing') {
                    startGame();
                }
            });

            // Save name on input
            playerNameInput.addEventListener('input', () => {
                playerName = playerNameInput.value.trim();
                localStorage.setItem('bulletDodgePlayerName', playerName);
            });

            // ─── Mobile Detection & Touch Controls ───

            const mobileHint = document.getElementById('mobile-hint');
            const instructionsText = document.getElementById('instructions-text');

            // Touch tracking
            let activeTouchId = null;
            let touchStartX = 0;
            let touchStartY = 0;
            let playerStartX = 0;
            let playerStartY = 0;

            if (isMobile) {
                document.body.style.cursor = 'auto';
                mobileHint.style.display = 'block';
            }

            // Prevent ALL default touch behaviors globally (zoom, scroll, etc.)
            document.addEventListener('touchstart', e => {
                // Allow touch on inputs and buttons (for name field, start/retry)
                const tag = e.target.tagName;
                if (tag === 'INPUT' || tag === 'BUTTON') return;
                if (gameState === 'playing') e.preventDefault();
            }, { passive: false });

            document.addEventListener('touchmove', e => {
                if (gameState === 'playing') e.preventDefault();
            }, { passive: false });

            document.addEventListener('touchend', e => {
                if (gameState === 'playing') e.preventDefault();
            }, { passive: false });

            // Touch handlers - drag to move plane (relative movement)
            document.addEventListener('touchstart', e => {
                if (gameState !== 'playing') return;
                if (activeTouchId !== null) return; // already tracking a touch

                const touch = e.changedTouches[0];
                activeTouchId = touch.identifier;
                touchStartX = touch.clientX;
                touchStartY = touch.clientY;
                playerStartX = player.targetX;
                playerStartY = player.targetY;
                useMouseControl = false;
            }, { passive: true });

            document.addEventListener('touchmove', e => {
                if (gameState !== 'playing' || activeTouchId === null) return;

                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.identifier === activeTouchId) {
                        // Relative drag: move player by the same delta as finger
                        const dx = touch.clientX - touchStartX;
                        const dy = touch.clientY - touchStartY;
                        player.targetX = playerStartX + dx * 1.5; // 1.5x multiplier for faster response
                        player.targetY = playerStartY + dy * 1.5;

                        // Clamp to screen
                        player.targetX = Math.max(player.size, Math.min(canvas.width - player.size, player.targetX));
                        player.targetY = Math.max(player.size, Math.min(canvas.height - player.size, player.targetY));
                        break;
                    }
                }
            }, { passive: true });

            document.addEventListener('touchend', e => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === activeTouchId) {
                        activeTouchId = null;
                        break;
                    }
                }
            }, { passive: true });

            document.addEventListener('touchcancel', e => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    if (e.changedTouches[i].identifier === activeTouchId) {
                        activeTouchId = null;
                        break;
                    }
                }
            }, { passive: true });

            // ─── Game Functions ───
            function startGame() {
                playerName = playerNameInput.value.trim();
                localStorage.setItem('bulletDodgePlayerName', playerName);

                gameState = 'playing';
                startTime = performance.now();
                survivalTime = 0;
                bullets = [];
                particles = [];
                shakeAmount = 0;
                bulletSpawnRate = 0.8;
                bulletSpeed = 3;
                difficultyTimer = 0;
                frameCount = 0;
                lastSubmittedId = null;

                player.x = canvas.width / 2;
                player.y = canvas.height / 2;
                player.targetX = canvas.width / 2;
                player.targetY = canvas.height / 2;
                player.trail = [];
                player.invincible = true;

                setTimeout(() => { player.invincible = false; }, 1500);

                startScreen.style.display = 'none';
                gameoverScreen.style.display = 'none';
                timerDisplay.style.display = 'block';
                bulletCountDisplay.style.display = 'block';

                // Reset gameover UI
                rankInfoEl.style.display = 'none';
                submitStatusEl.textContent = '';

                if (isMobile) {
                    mobileHint.style.display = 'none';
                    document.body.style.cursor = 'auto';
                } else {
                    document.body.style.cursor = 'none';
                }
            }

            async function gameOver() {
                gameState = 'gameover';
                shakeAmount = 15;
                activeTouchId = null;

                // Explosion particles
                for (let i = 0; i < 80; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 8 + 2;
                    particles.push({
                        x: player.x,
                        y: player.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: Math.random() * 4 + 2,
                        life: 1,
                        decay: Math.random() * 0.02 + 0.01,
                        color: ['#ff3344', '#ff8800', '#ffcc00', '#00ffcc', '#ffffff'][Math.floor(Math.random() * 5)],
                    });
                }

                // Check local high score
                let isNewRecord = false;
                if (survivalTime > highScore) {
                    highScore = survivalTime;
                    localStorage.setItem('bulletDodgeHighScore', highScore.toString());
                    bestTimeDisplay.textContent = highScore.toFixed(2) + 's';
                    isNewRecord = true;
                }

                finalTimeEl.textContent = survivalTime.toFixed(2) + 's';
                newRecordEl.style.display = isNewRecord ? 'block' : 'none';

                setTimeout(async () => {
                    gameoverScreen.style.display = 'flex';
                    document.body.style.cursor = 'pointer';

                    // Submit score online
                    if (playerName && serverOnline) {
                        await submitScore(playerName, survivalTime);
                    } else if (!playerName) {
                        submitStatusEl.textContent = '이름을 입력하면 기록이 저장됩니다';
                    }

                    // Fetch leaderboard
                    const gameoverList = document.getElementById('gameover-lb-list');
                    await fetchLeaderboard(gameoverList);
                }, 800);
            }

            // ─── Bullet Spawning ───
            let lastSpawnTime = 0;

            function spawnBullet() {
                const side = Math.floor(Math.random() * 4);
                let x, y, angle;
                const margin = 40;

                switch (side) {
                    case 0: x = Math.random() * canvas.width; y = -margin; break;
                    case 1: x = canvas.width + margin; y = Math.random() * canvas.height; break;
                    case 2: x = Math.random() * canvas.width; y = canvas.height + margin; break;
                    case 3: x = -margin; y = Math.random() * canvas.height; break;
                }

                const aimX = player.x + (Math.random() - 0.5) * 200;
                const aimY = player.y + (Math.random() - 0.5) * 200;
                angle = Math.atan2(aimY - y, aimX - x);

                const speedMult = 0.8 + Math.random() * 0.6;
                const currentSpeed = bulletSpeed * speedMult;

                const colors = [
                    { fill: '#ff4466', glow: 'rgba(255,68,102,0.6)' },
                    { fill: '#ff8800', glow: 'rgba(255,136,0,0.6)' },
                    { fill: '#ffcc00', glow: 'rgba(255,204,0,0.6)' },
                    { fill: '#cc44ff', glow: 'rgba(204,68,255,0.6)' },
                    { fill: '#4488ff', glow: 'rgba(68,136,255,0.6)' },
                ];
                const color = colors[Math.floor(Math.random() * colors.length)];
                const size = 4 + Math.random() * 4;

                bullets.push({
                    x, y, angle,
                    vx: Math.cos(angle) * currentSpeed,
                    vy: Math.sin(angle) * currentSpeed,
                    size, color, trail: [],
                });
            }

            // ─── Update ───
            function update(dt) {
                frameCount++;

                if (gameState === 'playing') {
                    survivalTime = (performance.now() - startTime) / 1000;
                    timerDisplay.textContent = survivalTime.toFixed(2) + 's';

                    difficultyTimer += dt;
                    const timeFactor = survivalTime;

                    bulletSpawnRate = Math.max(minSpawnRate, 0.8 - timeFactor * 0.015);
                    bulletSpeed = 3 + timeFactor * 0.08;

                    lastSpawnTime += dt;
                    if (lastSpawnTime >= bulletSpawnRate) {
                        lastSpawnTime = 0;
                        const multiSpawn = Math.floor(1 + timeFactor / 15);
                        for (let i = 0; i < multiSpawn; i++) {
                            spawnBullet();
                        }
                    }

                    bulletCountDisplay.textContent = `BULLETS: ${bullets.length}`;

                    if (bullets.length > 50) {
                        warningFlash = Math.sin(frameCount * 0.1) * 0.5 + 0.5;
                        warningFlashEl.style.opacity = warningFlash * 0.3;
                    } else {
                        warningFlashEl.style.opacity = 0;
                    }

                    const moveSpeed = 6;

                    if (useMouseControl) {
                        player.targetX = mouseX;
                        player.targetY = mouseY;
                    } else {
                        if (keys['ArrowLeft'] || keys['a']) player.targetX -= moveSpeed * 2;
                        if (keys['ArrowRight'] || keys['d']) player.targetX += moveSpeed * 2;
                        if (keys['ArrowUp'] || keys['w']) player.targetY -= moveSpeed * 2;
                        if (keys['ArrowDown'] || keys['s']) player.targetY += moveSpeed * 2;
                    }

                    const ease = useMouseControl ? 0.12 : 0.15;
                    player.x += (player.targetX - player.x) * ease;
                    player.y += (player.targetY - player.y) * ease;

                    player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
                    player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

                    const dx = player.targetX - player.x;
                    const dy = player.targetY - player.y;
                    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) {
                        const targetAngle = Math.atan2(dy, dx);
                        let angleDiff = targetAngle - player.angle;
                        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                        player.angle += angleDiff * 0.1;
                    }

                    player.trail.push({ x: player.x, y: player.y, life: 1 });
                    if (player.trail.length > 30) player.trail.shift();
                    player.trail.forEach(t => t.life -= 0.03);
                    player.trail = player.trail.filter(t => t.life > 0);

                    player.engineGlow = 0.5 + Math.sin(frameCount * 0.3) * 0.3;

                    for (let i = bullets.length - 1; i >= 0; i--) {
                        const b = bullets[i];
                        b.x += b.vx;
                        b.y += b.vy;

                        b.trail.push({ x: b.x, y: b.y, life: 1 });
                        if (b.trail.length > 8) b.trail.shift();
                        b.trail.forEach(t => t.life -= 0.12);

                        const margin = 100;
                        if (b.x < -margin || b.x > canvas.width + margin ||
                            b.y < -margin || b.y > canvas.height + margin) {
                            bullets.splice(i, 1);
                            continue;
                        }

                        if (!player.invincible) {
                            const distX = b.x - player.x;
                            const distY = b.y - player.y;
                            const dist = Math.sqrt(distX * distX + distY * distY);
                            if (dist < player.size * 0.7 + b.size * 0.5) {
                                gameOver();
                                break;
                            }
                        }
                    }
                }

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }

                if (shakeAmount > 0) shakeAmount *= 0.9;
                if (shakeAmount < 0.1) shakeAmount = 0;

                stars.forEach(s => {
                    s.brightness += s.twinkleSpeed;
                    if (s.brightness > 1 || s.brightness < 0.2) s.twinkleSpeed *= -1;
                });
            }

            // ─── Draw ───
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.save();

                if (shakeAmount > 0) {
                    const sx = (Math.random() - 0.5) * shakeAmount * 2;
                    const sy = (Math.random() - 0.5) * shakeAmount * 2;
                    ctx.translate(sx, sy);
                }

                const bgGrad = ctx.createRadialGradient(
                    canvas.width / 2, canvas.height / 2, 0,
                    canvas.width / 2, canvas.height / 2, canvas.width * 0.7
                );
                bgGrad.addColorStop(0, '#0a0e1a');
                bgGrad.addColorStop(0.5, '#060a14');
                bgGrad.addColorStop(1, '#020408');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(-20, -20, canvas.width + 40, canvas.height + 40);

                ctx.strokeStyle = 'rgba(0, 255, 204, 0.03)';
                ctx.lineWidth = 1;
                const gridSize = 60;
                for (let x = 0; x < canvas.width; x += gridSize) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
                }
                for (let y = 0; y < canvas.height; y += gridSize) {
                    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
                }

                stars.forEach(s => {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200, 220, 255, ${s.brightness * 0.6})`;
                    ctx.fill();
                });

                bullets.forEach(b => {
                    b.trail.forEach((t) => {
                        if (t.life > 0) {
                            ctx.beginPath();
                            ctx.arc(t.x, t.y, b.size * 0.5 * t.life, 0, Math.PI * 2);
                            ctx.fillStyle = b.color.glow.replace('0.6', (t.life * 0.3).toFixed(2));
                            ctx.fill();
                        }
                    });

                    ctx.shadowColor = b.color.fill;
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                    ctx.fillStyle = b.color.fill;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(b.x, b.y, b.size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                if (gameState === 'playing' || gameState === 'start') {
                    player.trail.forEach((t) => {
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, player.size * 0.3 * t.life, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(0, 255, 204, ${t.life * 0.2})`;
                        ctx.fill();
                    });

                    ctx.save();
                    ctx.translate(player.x, player.y);
                    ctx.rotate(player.angle);

                    if (player.invincible) {
                        ctx.beginPath();
                        ctx.arc(0, 0, player.size * 1.8, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(0, 255, 204, ${0.3 + Math.sin(frameCount * 0.2) * 0.2})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }

                    const exhaustLen = 12 + player.engineGlow * 8;
                    const exhaustGrad = ctx.createLinearGradient(-player.size - exhaustLen, 0, -player.size, 0);
                    exhaustGrad.addColorStop(0, 'rgba(0, 150, 255, 0)');
                    exhaustGrad.addColorStop(0.5, 'rgba(0, 200, 255, 0.4)');
                    exhaustGrad.addColorStop(1, 'rgba(100, 255, 255, 0.8)');
                    ctx.fillStyle = exhaustGrad;
                    ctx.beginPath();
                    ctx.moveTo(-player.size, -5);
                    ctx.lineTo(-player.size - exhaustLen, 0);
                    ctx.lineTo(-player.size, 5);
                    ctx.closePath();
                    ctx.fill();

                    ctx.shadowColor = '#00ffcc';
                    ctx.shadowBlur = 10;

                    // Rotate specifically for this UP-facing sprite array
                    ctx.rotate(Math.PI / 2);

                    const shipPixels = [
                        "       1       ",
                        "       1       ",
                        "      111      ",
                        "      111      ",
                        "  2   111   2  ",
                        "  2   111   2  ",
                        " 22  31113  22 ",
                        " 2111112111112 ",
                        " 2111122211112 ",
                        " 211112 211112 ",
                        " 21112   21112 ",
                        "  1112   2111  ",
                        "   1       1   "
                    ];

                    const pSize = player.size / 7.5; // pixel block size
                    const offsetX = -pSize * 7.5;
                    const offsetY = -pSize * 6.5;

                    for (let r = 0; r < shipPixels.length; r++) {
                        for (let c = 0; c < shipPixels[r].length; c++) {
                            const char = shipPixels[r][c];
                            if (char !== ' ') {
                                if (char === '1') ctx.fillStyle = '#ffffff';
                                else if (char === '2') ctx.fillStyle = '#ff2244';
                                else if (char === '3') ctx.fillStyle = '#00bbff';
                                // Draw pixel with slight overlap to prevent gaps
                                ctx.fillRect(offsetX + c * pSize, offsetY + r * pSize, pSize + 0.5, pSize + 0.5);
                            }
                        }
                    }

                    ctx.shadowBlur = 0;
                    ctx.restore();
                }

                particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                });

                if (gameState === 'playing' && survivalTime > 10) {
                    const intensity = Math.min(0.4, (survivalTime - 10) * 0.005);
                    const pulse = Math.sin(frameCount * 0.05) * 0.5 + 0.5;

                    const edgeGrad = ctx.createLinearGradient(0, 0, 80, 0);
                    edgeGrad.addColorStop(0, `rgba(255, 0, 50, ${intensity * pulse})`);
                    edgeGrad.addColorStop(1, 'rgba(255, 0, 50, 0)');
                    ctx.fillStyle = edgeGrad;
                    ctx.fillRect(0, 0, 80, canvas.height);

                    const edgeGrad2 = ctx.createLinearGradient(canvas.width, 0, canvas.width - 80, 0);
                    edgeGrad2.addColorStop(0, `rgba(255, 0, 50, ${intensity * pulse})`);
                    edgeGrad2.addColorStop(1, 'rgba(255, 0, 50, 0)');
                    ctx.fillStyle = edgeGrad2;
                    ctx.fillRect(canvas.width - 80, 0, 80, canvas.height);

                    const edgeGrad3 = ctx.createLinearGradient(0, 0, 0, 80);
                    edgeGrad3.addColorStop(0, `rgba(255, 0, 50, ${intensity * pulse})`);
                    edgeGrad3.addColorStop(1, 'rgba(255, 0, 50, 0)');
                    ctx.fillStyle = edgeGrad3;
                    ctx.fillRect(0, 0, canvas.width, 80);

                    const edgeGrad4 = ctx.createLinearGradient(0, canvas.height, 0, canvas.height - 80);
                    edgeGrad4.addColorStop(0, `rgba(255, 0, 50, ${intensity * pulse})`);
                    edgeGrad4.addColorStop(1, 'rgba(255, 0, 50, 0)');
                    ctx.fillStyle = edgeGrad4;
                    ctx.fillRect(0, canvas.height - 80, canvas.width, 80);
                }

                ctx.restore();
            }

            // ─── Game Loop ───
            let lastTime = performance.now();

            function gameLoop(currentTime) {
                const dt = (currentTime - lastTime) / 1000;
                lastTime = currentTime;
                const clampedDt = Math.min(dt, 0.05);
                update(clampedDt);
                draw();
                requestAnimationFrame(gameLoop);
            }

            requestAnimationFrame(gameLoop);

            // ─── Init: Check server & load leaderboard ───
            (async () => {
                await checkConnection();
                const startList = document.getElementById('start-lb-list');
                await fetchLeaderboard(startList);
            })();

        })();
    </script>
</body>
